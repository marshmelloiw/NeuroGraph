<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Sohbet Uygulaması</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; }
        .chat-container { max-width: 600px; margin: 0 auto; background-color: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        #chat-box { border: 1px solid #ddd; padding: 10px; min-height: 300px; max-height: 400px; overflow-y: auto; margin-bottom: 10px; border-radius: 4px; background-color: #e9e9e9; }
        .message { margin-bottom: 8px; padding: 6px 10px; border-radius: 5px; }
        .user-message { text-align: right; background-color: #dcf8c6; }
        .gemini-message { text-align: left; background-color: #c6e8f8; }
        #user-input { width: calc(100% - 70px); padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        #send-button { width: 60px; padding: 8px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #send-button:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <div class="chat-container">
        <h1>Gemini ile Sohbet</h1>
        <div id="chat-box"></div>
        <input type="text" id="user-input" placeholder="Mesajınızı yazın...">
        <button id="send-button">Gönder</button>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');

        sendButton.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        function addMessage(sender, message) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message');
            if (sender === 'user') {
                messageDiv.classList.add('user-message');
                messageDiv.textContent = 'Siz: ' + message;
            } else {
                messageDiv.classList.add('gemini-message');
                messageDiv.textContent = 'Gemini: ' + message;
            }
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight; // En alta kaydır
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (message === '') return;

            addMessage('user', message);
            userInput.value = ''; // Mesajı gönderdikten sonra kutuyu temizle

            try {
                const response = await fetch('/send_message', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();

                if (response.ok) {
                    addMessage('gemini', data.response);
                } else {
                    addMessage('gemini', 'Hata: ' + data.error);
                }
            } catch (error) {
                addMessage('gemini', 'İletişim hatası: Sunucuya ulaşılamıyor.');
                console.error('Fetch error:', error);
            }
        }
    </script>
</body>
</html>
